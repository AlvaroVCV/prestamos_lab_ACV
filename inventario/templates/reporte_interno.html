{% extends "base.html" %}

{% block title %}Reporte Interno{% endblock %}

{% block content %}
<h1 class="mb-4"><i class="bi bi-bar-chart"></i> Reporte Interno</h1>

<div class="row g-4">
    <div class="col-md-4">
        <div class="card shadow-sm text-center">
            <div class="card-body py-4">
                <i class="bi bi-laptop display-4 text-primary"></i>
                <h2 class="mt-3 display-5 fw-bold">{{ total }}</h2>
                <p class="text-muted mb-0">Total de Notebooks</p>
            </div>
        </div>
    </div>
    <div class="col-md-4">
        <div class="card shadow-sm text-center">
            <div class="card-body py-4">
                <i class="bi bi-check-circle display-4 text-success"></i>
                <h2 class="mt-3 display-5 fw-bold">{{ disponibles }}</h2>
                <p class="text-muted mb-0">Disponibles</p>
            </div>
        </div>
    </div>
    <div class="col-md-4">
        <div class="card shadow-sm text-center">
            <div class="card-body py-4">
                <i class="bi bi-tools display-4 text-danger"></i>
                <h2 class="mt-3 display-5 fw-bold">{{ mantencion }}</h2>
                <p class="text-muted mb-0">En Mantención</p>
            </div>
        </div>
    </div>
</div>

<div class="mt-4">
    <a href="{% url 'notebook_list' %}" class="btn btn-outline-secondary">
        <i class="bi bi-arrow-left"></i> Volver al listado
    </a>
</div>
{% endblock %}
